<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardKeep Dashboard</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            padding: 40px 24px;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .header h1 span { color: #ED9B61; }

        .header p {
            color: #888;
            margin-top: 6px;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto 32px;
        }

        .stat-card {
            background: #161616;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            transition: border-color 0.2s;
        }

        .stat-card:hover { border-color: #ED9B61; }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
        }

        .stat-sub {
            font-size: 13px;
            color: #555;
            margin-top: 4px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto 32px;
        }

        .chart-card {
            background: #161616;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
        }

        .chart-card h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Bar chart */
        .bar-chart { display: flex; flex-direction: column; gap: 10px; }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bar-label {
            width: 90px;
            font-size: 13px;
            color: #aaa;
            text-align: right;
            flex-shrink: 0;
        }

        .bar-track {
            flex: 1;
            height: 28px;
            background: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            min-width: 2px;
        }

        .bar-count {
            width: 36px;
            font-size: 13px;
            color: #666;
            text-align: left;
            flex-shrink: 0;
        }

        /* Donut chart */
        .donut-container {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .donut-svg { flex-shrink: 0; }

        .donut-legend { display: flex; flex-direction: column; gap: 8px; }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #aaa;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-count {
            color: #555;
            margin-left: auto;
            padding-left: 12px;
        }

        /* Timeline */
        .timeline-chart {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 120px;
            padding-top: 8px;
        }

        .timeline-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }

        .timeline-bar {
            width: 100%;
            max-width: 32px;
            background: #ED9B61;
            border-radius: 4px 4px 0 0;
            transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            min-height: 2px;
        }

        .timeline-label {
            font-size: 10px;
            color: #555;
            margin-top: 6px;
            text-align: center;
        }

        /* Recent table */
        .table-card {
            background: #161616;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
            overflow-x: auto;
        }

        .table-card h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 16px;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            padding: 8px 12px;
            border-bottom: 1px solid #222;
        }

        td {
            padding: 10px 12px;
            font-size: 13px;
            color: #aaa;
            border-bottom: 1px solid #1a1a1a;
        }

        tr:hover td { color: #ddd; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-vertical { background: #1a2a1a; color: #6bba6b; }
        .badge-horizontal { background: #1a1a2a; color: #6b8bba; }
        .badge-postcard { background: #2a1a2a; color: #ba6bba; }
        .badge-diecut { background: #2a2218; color: #ED9B61; }
        .badge-saved { background: #1a2a1a; color: #6bba6b; }
        .badge-abandoned { background: #2a1a1a; color: #ba6b6b; }

        .loading {
            text-align: center;
            padding: 80px 0;
            color: #555;
            font-size: 15px;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .refresh-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            border-color: #ED9B61;
            color: #ED9B61;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Small pill-style checkbox for the "Show internal" toggle. */
        .toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .toggle:hover { border-color: #ED9B61; color: #ED9B61; }

        .toggle input { accent-color: #ED9B61; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row">
            <div style="display:flex;align-items:center;gap:16px">
                <img src="favicon.png" alt="CardKeep" style="width:48px;height:48px;border-radius:12px">
                <div>
                    <h1>Card<span>Keep</span> Dashboard</h1>
                    <p id="subtitle">Loading...</p>
                </div>
            </div>
            <div class="header-controls">
                <label class="toggle">
                    <input type="checkbox" id="internal-toggle">
                    Show internal
                </label>
                <button class="refresh-btn" onclick="fetchData()">Refresh</button>
            </div>
        </div>
    </div>

    <div id="content">
        <div class="loading">Loading data</div>
    </div>

    <script>
        const ENDPOINT = 'https://script.google.com/macros/s/AKfycbxB7YD_JPm1_iKDFXAMKojC8M_MCFqmzO0kVn8RIB0EOvXG4j5mTbev5FurUTb6L3hW9A/exec';

        // Cached response so toggling "Show internal" re-renders without a
        // second network round-trip.
        let cachedRows = null;
        let cachedFunnelRows = null;
        let cachedFunnelSummary = null;

        async function fetchData() {
            try {
                const res = await fetch(ENDPOINT);
                const json = await res.json();
                // New script returns funnelRows + funnelSummary; old script
                // returns neither. funnelRows is what lets us recompute the
                // summary client-side when the internal toggle flips.
                if (json.status === 'ok' && json.rows.length > 1) {
                    cachedRows = json.rows;
                    cachedFunnelRows = json.funnelRows || null;
                    cachedFunnelSummary = json.funnelSummary || null;
                    renderDashboard(cachedRows, cachedFunnelRows, cachedFunnelSummary);
                } else {
                    document.getElementById('content').innerHTML = '<div class="loading">No data yet — scan some cards!</div>';
                    document.getElementById('subtitle').textContent = 'No captures recorded';
                }
            } catch (err) {
                document.getElementById('content').innerHTML = `<div class="loading">Error loading data: ${err.message}</div>`;
            }
        }

        // Compute median time between consecutive funnel steps, plus
        // end-to-end median for fully completed sessions. Uses the same
        // showInternal filter as summarizeFunnelClient so durations and counts
        // stay consistent.
        //
        // Caveat: timestamps are set server-side when each POST lands, so
        // per-step durations carry network-latency noise. Medians across many
        // sessions damp it; treat as approximate.
        function computeStepDurationsClient(rows) {
            const empty = { transitions: {}, endToEnd: null };
            if (!rows || rows.length < 2) return empty;

            const header = rows[0];
            const tsCol = header.indexOf('timestamp');
            const sessionCol = header.indexOf('sessionId');
            const stepCol = header.indexOf('step');
            const deviceCol = header.indexOf('deviceId');
            if (tsCol < 0 || sessionCol < 0 || stepCol < 0) return empty;

            // Group rows into sessions, capturing the earliest timestamp per
            // step (in case the same step is logged twice within one session).
            const sessions = new Map();
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!showInternal && deviceCol >= 0 && INTERNAL_DEVICES.has(row[deviceCol])) continue;
                const sid = row[sessionCol];
                const step = row[stepCol];
                const ts = row[tsCol];
                if (!sid || !step || !ts) continue;
                const ms = (ts instanceof Date) ? ts.getTime() : new Date(ts).getTime();
                if (Number.isNaN(ms)) continue;
                if (!sessions.has(sid)) sessions.set(sid, {});
                const stepFirstTs = sessions.get(sid);
                if (stepFirstTs[step] == null || ms < stepFirstTs[step]) {
                    stepFirstTs[step] = ms;
                }
            }

            const stepOrder = ['started', 'typeChosen', 'outsideScanned', 'previewReached', 'categorizeReached', 'saved'];
            const transitionTimes = {}; // key 'a→b' → [durations in ms]
            const endToEndTimes = [];

            for (const stepFirstTs of sessions.values()) {
                for (let i = 1; i < stepOrder.length; i++) {
                    const prev = stepOrder[i - 1];
                    const curr = stepOrder[i];
                    if (stepFirstTs[prev] != null && stepFirstTs[curr] != null) {
                        const dt = stepFirstTs[curr] - stepFirstTs[prev];
                        if (dt >= 0) {
                            const key = `${prev}→${curr}`;
                            (transitionTimes[key] ||= []).push(dt);
                        }
                    }
                }
                if (stepFirstTs.started != null && stepFirstTs.saved != null) {
                    const dt = stepFirstTs.saved - stepFirstTs.started;
                    if (dt >= 0) endToEndTimes.push(dt);
                }
            }

            const transitions = {};
            Object.entries(transitionTimes).forEach(([k, vals]) => {
                transitions[k] = { medianMs: median(vals), n: vals.length };
            });

            return {
                transitions,
                endToEnd: endToEndTimes.length
                    ? { medianMs: median(endToEndTimes), n: endToEndTimes.length }
                    : null
            };
        }

        function median(arr) {
            if (!arr.length) return null;
            const sorted = [...arr].sort((a, b) => a - b);
            const mid = Math.floor(sorted.length / 2);
            return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
        }

        // One row per started session: where it ended (last step reached) and
        // how long it took (started → last step). Used for the "Capture
        // Sessions" table — gives raw visibility into individual flows that
        // the aggregate funnel hides. Same internal-device filter as the
        // other funnel functions.
        function computeSessionsListClient(rows) {
            if (!rows || rows.length < 2) return [];

            const header = rows[0];
            const tsCol = header.indexOf('timestamp');
            const sessionCol = header.indexOf('sessionId');
            const stepCol = header.indexOf('step');
            const deviceCol = header.indexOf('deviceId');
            const abandonedCol = header.indexOf('abandonedAt');
            if (tsCol < 0 || sessionCol < 0 || stepCol < 0) return [];

            const stepOrder = ['started', 'typeChosen', 'outsideScanned', 'previewReached', 'categorizeReached', 'saved'];
            const stepRank = Object.fromEntries(stepOrder.map((s, i) => [s, i]));

            // Group rows by sessionId, tracking earliest timestamp per step
            // plus the device + any abandonedAt marker.
            const sessions = new Map();
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!showInternal && deviceCol >= 0 && INTERNAL_DEVICES.has(row[deviceCol])) continue;
                const sid = row[sessionCol];
                const step = row[stepCol];
                const ts = row[tsCol];
                if (!sid || !step || !ts) continue;
                const ms = (ts instanceof Date) ? ts.getTime() : new Date(ts).getTime();
                if (Number.isNaN(ms)) continue;

                if (!sessions.has(sid)) {
                    sessions.set(sid, {
                        sessionId: sid,
                        deviceId: deviceCol >= 0 ? row[deviceCol] : null,
                        stepTs: {},
                        abandonedAt: null
                    });
                }
                const s = sessions.get(sid);
                if (s.stepTs[step] == null || ms < s.stepTs[step]) s.stepTs[step] = ms;
                if (abandonedCol >= 0 && row[abandonedCol] && !s.abandonedAt) {
                    s.abandonedAt = row[abandonedCol];
                }
            }

            // Only include sessions that actually started — the dashboard's
            // funnel uses "Started" as the denominator, this matches.
            const out = [];
            for (const s of sessions.values()) {
                const startedAt = s.stepTs.started;
                if (startedAt == null) continue;

                // Last step reached = the step with highest rank that has a ts.
                let lastStep = 'started';
                let lastTs = startedAt;
                for (const step of stepOrder) {
                    if (s.stepTs[step] != null && stepRank[step] >= stepRank[lastStep]) {
                        lastStep = step;
                        lastTs = s.stepTs[step];
                    }
                }
                out.push({
                    sessionId: s.sessionId,
                    deviceId: s.deviceId,
                    startedAt,
                    lastStep,
                    lastTs,
                    durationMs: lastTs - startedAt,
                    completed: lastStep === 'saved',
                    abandonedAt: s.abandonedAt
                });
            }

            // Most recent first.
            out.sort((a, b) => b.startedAt - a.startedAt);
            return out;
        }

        function formatDuration(ms) {
            if (ms == null) return '';
            if (ms < 1000) return `${Math.round(ms)}ms`;
            const s = ms / 1000;
            if (s < 60) return `${s.toFixed(1)}s`;
            const m = Math.floor(s / 60);
            const rem = Math.round(s - m * 60);
            return rem ? `${m}m ${rem}s` : `${m}m`;
        }

        // Client-side mirror of the Apps Script's summarizeFunnel(), with an
        // extra deviceId filter so the "Show internal" toggle can recompute
        // the funnel without refetching. Falls back gracefully if the sheet
        // has no header row or is missing expected columns.
        function summarizeFunnelClient(rows) {
            const perStep = {};
            const abandonedAt = {};
            if (!rows || rows.length < 2) return { perStep, abandonedAt };

            const header = rows[0];
            const stepCol = header.indexOf('step');
            const abandonedCol = header.indexOf('abandonedAt');
            const deviceCol = header.indexOf('deviceId');

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!showInternal && deviceCol >= 0 && INTERNAL_DEVICES.has(row[deviceCol])) continue;

                const step = row[stepCol];
                if (step) perStep[step] = (perStep[step] || 0) + 1;

                const at = row[abandonedCol];
                if (at) abandonedAt[at] = (abandonedAt[at] || 0) + 1;
            }
            return { perStep, abandonedAt };
        }

        const INTERNAL_DEVICES = new Set([
            '103DF45F-718F-475C-A0AF-BC0D50CD4ECB',
            '693AEA1A-4BAE-46A9-B3E3-FC9FA2C202A3'
        ]);

        // "Show internal" toggle state, persisted so a reload respects the
        // previous choice. Read eagerly so the checkbox reflects it on init.
        let showInternal = localStorage.getItem('showInternal') === 'true';

        function renderDashboard(rows, funnelRows, funnelSummary) {
            const headers = rows[0];
            const allData = rows.slice(1).map(row => {
                const obj = {};
                headers.forEach((h, i) => obj[h] = row[i]);
                return obj;
            });

            // If we have raw funnel rows, recompute the summary client-side
            // so it respects the internal-devices filter. Fall back to the
            // server's pre-computed summary only if raw rows aren't available.
            const effectiveFunnelSummary = funnelRows
                ? summarizeFunnelClient(funnelRows)
                : funnelSummary;
            const stepDurations = funnelRows
                ? computeStepDurationsClient(funnelRows)
                : { transitions: {}, endToEnd: null };
            const sessionsList = funnelRows
                ? computeSessionsListClient(funnelRows)
                : [];

            // When internal is hidden, it's hidden everywhere (stats, charts,
            // table) so nothing can accidentally leak test captures into a
            // public view. When shown, internal rows appear in the table
            // with a faded INTERNAL badge but the numbers reflect the full set.
            const visible = showInternal
                ? allData
                : allData.filter(d => !INTERNAL_DEVICES.has(d['deviceId']));
            const data = visible;
            const tableData = visible;

            // Stats
            const total = data.length;
            const devices = new Set(data.map(d => d['deviceId'])).size;
            const dieCuts = data.filter(d => d['isDieCut'] === true || d['isDieCut'] === 'TRUE').length;
            const withFrom = data.filter(d => d['hasFromPerson'] === true || d['hasFromPerson'] === 'TRUE').length;

            // Card types
            const types = {};
            data.forEach(d => {
                const t = d['cardType'] || 'unknown';
                types[t] = (types[t] || 0) + 1;
            });

            // Categories
            const categories = {};
            data.forEach(d => {
                const c = d['category'] || 'Uncategorized';
                if (c) categories[c] = (categories[c] || 0) + 1;
            });

            // Timeline (by day)
            const byDay = {};
            data.forEach(d => {
                const ts = d['timestamp'];
                // Apps Script serializes Date cells as ISO strings, but sheets
                // may also return them as Date objects. Normalize both.
                const dayStr = ts instanceof Date
                    ? ts.toISOString().split('T')[0]
                    : (typeof ts === 'string' ? ts.split('T')[0] : 'unknown');
                byDay[dayStr] = (byDay[dayStr] || 0) + 1;
            });
            const sortedDays = Object.keys(byDay).sort();
            // Show last 14 days max
            const recentDays = sortedDays.slice(-14);

            // Device models
            const models = {};
            data.forEach(d => {
                const m = d['deviceModel'] || 'unknown';
                models[m] = (models[m] || 0) + 1;
            });

            const typeColors = {
                vertical: '#6bba6b',
                horizontal: '#6b8bba',
                postcard: '#ba6bba'
            };

            const catColors = ['#ED9B61', '#6bba6b', '#6b8bba', '#ba6bba', '#ba6b6b', '#6bbaba', '#baba6b', '#9b6bba'];

            document.getElementById('subtitle').textContent = `${total} cards captured across ${devices} device${devices !== 1 ? 's' : ''}`;

            let html = '';

            // Stat cards
            html += '<div class="stats-grid">';
            html += statCard('Total Cards', total, 'All time');
            html += statCard('Devices', devices, 'Unique');
            html += statCard('Die-Cut', dieCuts, `${total ? Math.round(dieCuts/total*100) : 0}% of total`);
            html += statCard('With Sender', withFrom, `${total ? Math.round(withFrom/total*100) : 0}% tagged`);
            html += '</div>';

            // Funnel section (only if the new Apps Script has served data)
            if (effectiveFunnelSummary && effectiveFunnelSummary.perStep) {
                html += renderFunnelSection(effectiveFunnelSummary, stepDurations);
            }

            // Per-session list — every started capture, where it ended, how
            // long it took. Sits between the aggregate funnel and the rest
            // of the charts so the relationship is obvious.
            if (sessionsList.length) {
                html += renderSessionsList(sessionsList);
            }

            // Charts
            html += '<div class="charts-grid">';

            // Card type donut
            html += '<div class="chart-card">';
            html += '<h3>Card Types</h3>';
            html += renderDonut(types, typeColors);
            html += '</div>';

            // Categories bar chart
            html += '<div class="chart-card">';
            html += '<h3>Categories</h3>';
            const sortedCats = Object.entries(categories).sort((a, b) => b[1] - a[1]);
            const maxCat = sortedCats.length ? sortedCats[0][1] : 1;
            html += '<div class="bar-chart">';
            sortedCats.forEach(([name, count], i) => {
                const pct = (count / maxCat * 100).toFixed(1);
                const color = catColors[i % catColors.length];
                html += `<div class="bar-row">
                    <div class="bar-label">${name}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
                    <div class="bar-count">${count}</div>
                </div>`;
            });
            html += '</div></div>';

            // Devices
            html += '<div class="chart-card">';
            html += '<h3>Device Models</h3>';
            // Map internal model IDs to friendly names and merge duplicates
            const friendlyModels = {};
            Object.entries(models).forEach(([model, count]) => {
                const name = deviceName(model);
                friendlyModels[name] = (friendlyModels[name] || 0) + count;
            });
            const sortedModels = Object.entries(friendlyModels).sort((a, b) => b[1] - a[1]);
            const maxModel = sortedModels.length ? sortedModels[0][1] : 1;
            html += '<div class="bar-chart">';
            sortedModels.forEach(([name, count]) => {
                const pct = (count / maxModel * 100).toFixed(1);
                html += `<div class="bar-row">
                    <div class="bar-label" style="width:120px">${name}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#ED9B61"></div></div>
                    <div class="bar-count">${count}</div>
                </div>`;
            });
            html += '</div></div>';

            html += '</div>';

            // Timeline — full width
            html += '<div class="chart-card" style="max-width:1200px;margin:0 auto 32px">';
            html += '<h3>Captures Over Time</h3>';
            const maxDay = Math.max(...recentDays.map(d => byDay[d]));
            html += '<div class="timeline-chart">';
            recentDays.forEach(day => {
                const count = byDay[day];
                const pct = (count / maxDay * 100).toFixed(1);
                const label = day.slice(5); // MM-DD
                html += `<div class="timeline-bar-wrapper">
                    <div class="timeline-bar" style="height:${pct}%" title="${day}: ${count} cards"></div>
                    <div class="timeline-label">${label}</div>
                </div>`;
            });
            html += '</div></div>';

            // Recent captures table
            html += '<div class="table-card">';
            html += '<h3>Recent Captures</h3>';
            html += '<table><thead><tr>';
            html += '<th>Time</th><th>Type</th><th>Category</th><th>Die-Cut</th><th>From</th><th>Device</th><th>Version</th>';
            html += '</tr></thead><tbody>';

            const recent = [...tableData].reverse().slice(0, 30);
            recent.forEach(d => {
                const isInternal = INTERNAL_DEVICES.has(d['deviceId']);
                const ts = d['timestamp'];
                const time = ts ? formatTime(ts instanceof Date ? ts : new Date(ts)) : '—';
                const type = d['cardType'] || '—';
                const typeBadge = `badge-${type}`;
                const cat = d['category'] || '—';
                const diecut = (d['isDieCut'] === true || d['isDieCut'] === 'TRUE') ? '<span class="badge badge-diecut">Die-Cut</span>' : '—';
                const from = (d['hasFromPerson'] === true || d['hasFromPerson'] === 'TRUE') ? 'Yes' : '—';
                const device = deviceName(d['deviceModel'] || '') || '—';
                const version = d['appVersion'] || '—';
                const internalBadge = isInternal ? ' <span class="badge" style="background:#1a1a2a;color:#6b8bba">INTERNAL</span>' : '';
                const rowStyle = isInternal ? ' style="opacity:0.5"' : '';

                html += `<tr${rowStyle}>
                    <td>${time}${internalBadge}</td>
                    <td><span class="badge ${typeBadge}">${type}</span></td>
                    <td>${cat}</td>
                    <td>${diecut}</td>
                    <td>${from}</td>
                    <td>${device}</td>
                    <td>${version}</td>
                </tr>`;
            });

            html += '</tbody></table></div>';

            document.getElementById('content').innerHTML = html;
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const mins = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            let relative;
            if (mins < 1) relative = 'Just now';
            else if (mins < 60) relative = `${mins}m ago`;
            else if (hours < 24) relative = `${hours}h ago`;
            else if (days === 1) relative = 'Yesterday';
            else if (days < 7) relative = `${days}d ago`;
            else relative = null;

            const timeStr = date.toLocaleString(undefined, {
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });

            return relative ? `${relative} <span style="color:#555">${timeStr}</span>` : timeStr;
        }

        function statCard(label, value, sub) {
            return `<div class="stat-card">
                <div class="stat-label">${label}</div>
                <div class="stat-value">${value}</div>
                <div class="stat-sub">${sub}</div>
            </div>`;
        }

        // Renders the scan-funnel section: one bar per step scaled to the
        // number of sessions that started, plus a drop-off chart showing where
        // abandoners bailed. The step order matches AnalyticsService.FunnelStep
        // in the iOS app.
        //
        // Per-step duration labels show median time spent reaching that step
        // from the previous one (computed client-side from session timestamps).
        function renderFunnelSection(summary, durations) {
            const stepOrder = [
                { key: 'started', label: 'Started' },
                { key: 'typeChosen', label: 'Type chosen' },
                { key: 'outsideScanned', label: 'Outside scanned' },
                { key: 'previewReached', label: 'Preview reached' },
                { key: 'categorizeReached', label: 'Categorize' },
                { key: 'saved', label: 'Saved' }
            ];

            const perStep = summary.perStep || {};
            const abandonedAt = summary.abandonedAt || {};
            const transitions = (durations && durations.transitions) || {};
            const endToEnd = durations && durations.endToEnd;
            const started = perStep.started || 0;

            if (started === 0) return '';

            let html = '<div class="charts-grid" style="grid-template-columns:1fr 1fr">';

            // Left: the funnel itself
            html += '<div class="chart-card">';
            html += `<h3>Scan Funnel — ${started} session${started === 1 ? '' : 's'}<span style="color:#555;font-weight:400"> · median time per step</span></h3>`;
            html += '<div class="bar-chart">';
            let prevCount = started;
            stepOrder.forEach((s, i) => {
                const count = perStep[s.key] || 0;
                const pctOfStart = started ? (count / started * 100) : 0;
                const dropFromPrev = prevCount ? ((prevCount - count) / prevCount * 100) : 0;
                // Color fades from brand orange to a deeper tone as the
                // funnel narrows — makes the drop-off visually obvious.
                const color = i === 0 ? '#ED9B61' : (count === 0 ? '#3a3a3a' : '#ED9B61');
                const dropLabel = i === 0 ? '' :
                    `<span style="color:#666"> · −${dropFromPrev.toFixed(0)}%</span>`;
                // Median time from previous step → this step (no label on
                // "Started" since there's no preceding step to time from).
                let timeLabel = '';
                if (i > 0) {
                    const t = transitions[`${stepOrder[i - 1].key}→${s.key}`];
                    if (t && t.medianMs != null) {
                        timeLabel = `<div style="font-size:11px;color:#666;margin-top:2px">+${formatDuration(t.medianMs)} <span style="color:#444">(n=${t.n})</span></div>`;
                    }
                }
                html += `<div class="bar-row">
                    <div class="bar-label" style="width:120px">${s.label}</div>
                    <div style="flex:1;display:flex;flex-direction:column;gap:0">
                        <div class="bar-track">
                            <div class="bar-fill" style="width:${pctOfStart.toFixed(1)}%;background:${color};opacity:${0.4 + (pctOfStart/200)}"></div>
                        </div>
                        ${timeLabel}
                    </div>
                    <div class="bar-count" style="width:90px">${count} <span style="color:#555">(${pctOfStart.toFixed(0)}%)</span>${dropLabel}</div>
                </div>`;
                prevCount = count;
            });
            html += '</div>';

            // Overall conversion rate, plus median end-to-end time for fully
            // completed sessions when we have it.
            const saved = perStep.saved || 0;
            const overall = started ? (saved / started * 100) : 0;
            const endToEndLabel = endToEnd && endToEnd.medianMs != null
                ? ` <span style="font-size:13px;font-weight:400;color:#888">· ${formatDuration(endToEnd.medianMs)} median</span>`
                : '';
            html += `<div style="margin-top:20px;padding-top:16px;border-top:1px solid #222;display:flex;justify-content:space-between;align-items:baseline">
                <span style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px">Overall completion</span>
                <span style="font-size:24px;font-weight:700;color:#fff">${overall.toFixed(1)}%${endToEndLabel}</span>
            </div>`;
            html += '</div>';

            // Right: drop-off chart — where abandoners bailed
            html += '<div class="chart-card">';
            const totalAbandoned = Object.values(abandonedAt).reduce((s, n) => s + n, 0);
            html += `<h3>Where Users Drop Off — ${totalAbandoned} abandoned</h3>`;

            if (totalAbandoned === 0) {
                html += '<div style="color:#555;font-size:13px;padding:12px 0">No abandoned sessions yet.</div>';
            } else {
                html += '<div class="bar-chart">';
                const dropOrder = stepOrder.slice(0, -1); // can't abandon from "saved"
                const maxDrop = Math.max(...dropOrder.map(s => abandonedAt[s.key] || 0), 1);
                dropOrder.forEach(s => {
                    const count = abandonedAt[s.key] || 0;
                    const pct = (count / maxDrop * 100).toFixed(1);
                    const shareOfAbandoned = totalAbandoned ? (count / totalAbandoned * 100) : 0;
                    html += `<div class="bar-row">
                        <div class="bar-label" style="width:120px">At ${s.label}</div>
                        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#ba6b6b"></div></div>
                        <div class="bar-count" style="width:70px">${count} <span style="color:#555">(${shareOfAbandoned.toFixed(0)}%)</span></div>
                    </div>`;
                });
                html += '</div>';
            }
            html += '</div>';

            html += '</div>'; // charts-grid

            return html;
        }

        // Per-session list of started captures: where each one ended (saved
        // or abandoned at a specific step) and how long it took from start
        // to that last step. Limited to the most recent 30 so the table
        // stays scannable; raw rows are still in the FunnelSteps sheet.
        function renderSessionsList(sessions) {
            if (!sessions.length) return '';

            const stepLabels = {
                started: 'Started',
                typeChosen: 'Type chosen',
                outsideScanned: 'Outside scanned',
                previewReached: 'Preview reached',
                categorizeReached: 'Categorize',
                saved: 'Saved'
            };

            const completedCount = sessions.filter(s => s.completed).length;
            const completionPct = (completedCount / sessions.length * 100).toFixed(0);

            let html = '<div class="table-card" style="max-width:1200px;margin:0 auto 32px">';
            html += `<h3>Capture Sessions <span style="color:#555;font-weight:400;font-size:13px">· ${sessions.length} started · ${completedCount} saved (${completionPct}%)</span></h3>`;
            html += '<table><thead><tr>';
            html += '<th>Started</th><th>Outcome</th><th>Last step</th><th>Duration</th><th>Device</th>';
            html += '</tr></thead><tbody>';

            const recent = sessions.slice(0, 30);
            recent.forEach(s => {
                const isInternal = s.deviceId && INTERNAL_DEVICES.has(s.deviceId);
                const startedDate = new Date(s.startedAt);
                const startedStr = formatTime(startedDate);
                const outcomeBadge = s.completed
                    ? '<span class="badge badge-saved">Saved</span>'
                    : '<span class="badge badge-abandoned">Abandoned</span>';
                const lastLabel = stepLabels[s.lastStep] || s.lastStep;
                // For abandoned sessions, surface the explicit abandonedAt
                // marker if it differs from the last step we saw — sometimes
                // the app logs an exit point past the last numbered step.
                const abandonedNote = (!s.completed && s.abandonedAt && s.abandonedAt !== s.lastStep)
                    ? ` <span style="color:#666;font-size:11px">(exit: ${stepLabels[s.abandonedAt] || s.abandonedAt})</span>`
                    : '';
                const durationStr = s.durationMs > 0 ? formatDuration(s.durationMs) : '—';
                const internalBadge = isInternal ? ' <span class="badge" style="background:#1a1a2a;color:#6b8bba">INTERNAL</span>' : '';
                const rowStyle = isInternal ? ' style="opacity:0.5"' : '';

                html += `<tr${rowStyle}>
                    <td>${startedStr}${internalBadge}</td>
                    <td>${outcomeBadge}</td>
                    <td>${lastLabel}${abandonedNote}</td>
                    <td>${durationStr}</td>
                    <td style="color:#666;font-size:11px;font-family:monospace">${s.deviceId ? s.deviceId.slice(0, 8) : '—'}</td>
                </tr>`;
            });

            html += '</tbody></table></div>';
            return html;
        }

        function renderDonut(data, colorMap) {
            const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);
            const total = entries.reduce((s, e) => s + e[1], 0);
            const defaultColors = ['#ED9B61', '#6bba6b', '#6b8bba', '#ba6bba'];

            const size = 120;
            const cx = size / 2, cy = size / 2, r = 44, stroke = 14;
            const circumference = 2 * Math.PI * r;

            let offset = 0;
            let arcs = '';
            let legend = '';

            entries.forEach(([name, count], i) => {
                const color = colorMap[name] || defaultColors[i % defaultColors.length];
                const pct = count / total;
                const dashLen = pct * circumference;
                const gap = circumference - dashLen;

                arcs += `<circle cx="${cx}" cy="${cy}" r="${r}"
                    fill="none" stroke="${color}" stroke-width="${stroke}"
                    stroke-dasharray="${dashLen} ${gap}"
                    stroke-dashoffset="${-offset}"
                    transform="rotate(-90 ${cx} ${cy})" />`;

                offset += dashLen;

                legend += `<div class="legend-item">
                    <div class="legend-dot" style="background:${color}"></div>
                    ${name}
                    <span class="legend-count">${count} (${Math.round(pct*100)}%)</span>
                </div>`;
            });

            // Center text
            arcs += `<text x="${cx}" y="${cy}" text-anchor="middle" dy="0.35em"
                fill="#fff" font-size="20" font-weight="700">${total}</text>`;

            return `<div class="donut-container">
                <svg class="donut-svg" width="${size}" height="${size}">${arcs}</svg>
                <div class="donut-legend">${legend}</div>
            </div>`;
        }

        const DEVICE_NAMES = {
            // iPhone
            'iPhone8,1': 'iPhone 6s', 'iPhone8,2': 'iPhone 6s Plus', 'iPhone8,4': 'iPhone SE',
            'iPhone9,1': 'iPhone 7', 'iPhone9,3': 'iPhone 7', 'iPhone9,2': 'iPhone 7 Plus', 'iPhone9,4': 'iPhone 7 Plus',
            'iPhone10,1': 'iPhone 8', 'iPhone10,4': 'iPhone 8', 'iPhone10,2': 'iPhone 8 Plus', 'iPhone10,5': 'iPhone 8 Plus',
            'iPhone10,3': 'iPhone X', 'iPhone10,6': 'iPhone X',
            'iPhone11,2': 'iPhone XS', 'iPhone11,4': 'iPhone XS Max', 'iPhone11,6': 'iPhone XS Max', 'iPhone11,8': 'iPhone XR',
            'iPhone12,1': 'iPhone 11', 'iPhone12,3': 'iPhone 11 Pro', 'iPhone12,5': 'iPhone 11 Pro Max', 'iPhone12,8': 'iPhone SE (2nd)',
            'iPhone13,1': 'iPhone 12 mini', 'iPhone13,2': 'iPhone 12', 'iPhone13,3': 'iPhone 12 Pro', 'iPhone13,4': 'iPhone 12 Pro Max',
            'iPhone14,2': 'iPhone 13 Pro', 'iPhone14,3': 'iPhone 13 Pro Max', 'iPhone14,4': 'iPhone 13 mini', 'iPhone14,5': 'iPhone 13',
            'iPhone14,6': 'iPhone SE (3rd)', 'iPhone14,7': 'iPhone 14', 'iPhone14,8': 'iPhone 14 Plus',
            'iPhone15,2': 'iPhone 14 Pro', 'iPhone15,3': 'iPhone 14 Pro Max', 'iPhone15,4': 'iPhone 15', 'iPhone15,5': 'iPhone 15 Plus',
            'iPhone16,1': 'iPhone 15 Pro', 'iPhone16,2': 'iPhone 15 Pro Max',
            'iPhone17,1': 'iPhone 16 Pro', 'iPhone17,2': 'iPhone 16 Pro Max', 'iPhone17,3': 'iPhone 16', 'iPhone17,4': 'iPhone 16 Plus',
            'iPhone17,5': 'iPhone 16e',
            'iPhone18,1': 'iPhone 17 Pro', 'iPhone18,2': 'iPhone 17 Pro Max',
            'iPhone18,3': 'iPhone 17', 'iPhone18,4': 'iPhone 17 Plus',
            'iPhone18,5': 'iPhone 17 Air', 'iPhone18,6': 'iPhone 17e',
            // iPad
            'iPad6,3': 'iPad Pro 9.7"', 'iPad6,4': 'iPad Pro 9.7"', 'iPad6,7': 'iPad Pro 12.9"', 'iPad6,8': 'iPad Pro 12.9"',
            'iPad6,11': 'iPad (5th)', 'iPad6,12': 'iPad (5th)',
            'iPad7,1': 'iPad Pro 12.9" (2nd)', 'iPad7,2': 'iPad Pro 12.9" (2nd)', 'iPad7,3': 'iPad Pro 10.5"', 'iPad7,4': 'iPad Pro 10.5"',
            'iPad7,5': 'iPad (6th)', 'iPad7,6': 'iPad (6th)', 'iPad7,11': 'iPad (7th)', 'iPad7,12': 'iPad (7th)',
            'iPad8,1': 'iPad Pro 11"', 'iPad8,2': 'iPad Pro 11"', 'iPad8,3': 'iPad Pro 11"', 'iPad8,4': 'iPad Pro 11"',
            'iPad8,5': 'iPad Pro 12.9" (3rd)', 'iPad8,6': 'iPad Pro 12.9" (3rd)', 'iPad8,7': 'iPad Pro 12.9" (3rd)', 'iPad8,8': 'iPad Pro 12.9" (3rd)',
            'iPad8,9': 'iPad Pro 11" (2nd)', 'iPad8,10': 'iPad Pro 11" (2nd)', 'iPad8,11': 'iPad Pro 12.9" (4th)', 'iPad8,12': 'iPad Pro 12.9" (4th)',
            'iPad11,1': 'iPad mini (5th)', 'iPad11,2': 'iPad mini (5th)', 'iPad11,3': 'iPad Air (3rd)', 'iPad11,4': 'iPad Air (3rd)',
            'iPad11,6': 'iPad (8th)', 'iPad11,7': 'iPad (8th)',
            'iPad12,1': 'iPad (9th)', 'iPad12,2': 'iPad (9th)',
            'iPad13,1': 'iPad Air (4th)', 'iPad13,2': 'iPad Air (4th)',
            'iPad13,4': 'iPad Pro 11" (3rd)', 'iPad13,5': 'iPad Pro 11" (3rd)', 'iPad13,6': 'iPad Pro 11" (3rd)', 'iPad13,7': 'iPad Pro 11" (3rd)',
            'iPad13,8': 'iPad Pro 12.9" (5th)', 'iPad13,9': 'iPad Pro 12.9" (5th)', 'iPad13,10': 'iPad Pro 12.9" (5th)', 'iPad13,11': 'iPad Pro 12.9" (5th)',
            'iPad13,16': 'iPad Air (5th)', 'iPad13,17': 'iPad Air (5th)', 'iPad13,18': 'iPad (10th)', 'iPad13,19': 'iPad (10th)',
            'iPad14,1': 'iPad mini (6th)', 'iPad14,2': 'iPad mini (6th)',
            'iPad14,3': 'iPad Pro 11" (4th)', 'iPad14,4': 'iPad Pro 11" (4th)', 'iPad14,5': 'iPad Pro 12.9" (6th)', 'iPad14,6': 'iPad Pro 12.9" (6th)',
            'iPad14,8': 'iPad Air 11" (M2)', 'iPad14,9': 'iPad Air 11" (M2)', 'iPad14,10': 'iPad Air 13" (M2)', 'iPad14,11': 'iPad Air 13" (M2)',
            'iPad16,1': 'iPad mini (A17 Pro)', 'iPad16,2': 'iPad mini (A17 Pro)',
            'iPad16,3': 'iPad Pro 11" (M4)', 'iPad16,4': 'iPad Pro 11" (M4)', 'iPad16,5': 'iPad Pro 13" (M4)', 'iPad16,6': 'iPad Pro 13" (M4)',
            // Mac (for Catalyst / Designed for iPad)
            'arm64': 'Mac (Apple Silicon)',
        };

        function deviceName(model) {
            return DEVICE_NAMES[model] || model;
        }

        // Wire up "Show internal" toggle. Flip state, persist, and re-render
        // from the cached response — no refetch needed.
        const internalToggle = document.getElementById('internal-toggle');
        internalToggle.checked = showInternal;
        internalToggle.addEventListener('change', (e) => {
            showInternal = e.target.checked;
            localStorage.setItem('showInternal', String(showInternal));
            if (cachedRows) renderDashboard(cachedRows, cachedFunnelRows, cachedFunnelSummary);
        });

        // Load on start
        fetchData();
    </script>
</body>
</html>
